---
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install base packages
  apt:
    name:
      - curl
      - git
      - ufw
      - fail2ban
    state: present

- name: Check UFW status
  command: ufw status
  register: ufw_status
  changed_when: false

- name: Show UFW status
  debug:
    var: ufw_status.stdout_lines
    